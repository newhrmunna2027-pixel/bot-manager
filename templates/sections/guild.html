<!-- templates/sections/guild.html -->
<div id="guild-tab" class="tab-section hidden space-y-4">
    <!-- ULTRA-COMPACT 5-METRIC ES-PORTS DECK (SCREENSHOT OPTIMIZED) -->
    <div class="glass-card rounded-2xl p-4 border border-white/5 bg-gradient-to-br from-[#141624] to-[#14172a] relative overflow-hidden">
        <div class="absolute right-[-10px] bottom-[-10px] opacity-[0.02] pointer-events-none select-none">
            <i class="fas fa-shield-halved text-[100px]"></i>
        </div>
        
        <div class="flex justify-between items-center mb-3 pb-2 border-b border-white/5 relative z-10">
            <h3 class="font-orbitron font-black text-white text-xs tracking-wider uppercase"><i class="fas fa-shield-halved text-yellow-500 mr-1"></i> Guild profile</h3>
            <span id="guild-id-display-badge" class="text-[9px] font-mono text-yellow-400/80 bg-yellow-500/10 border border-yellow-500/20 px-2 py-0.5 rounded-lg select-all">ID: 0000</span>
        </div>
        
        <div id="guild-status-info" class="space-y-3 relative z-10">
            <div class="text-center text-gray-500 py-4 text-xs animate-pulse">Syncing guild databases...</div>
        </div>
    </div>

    <!-- Active Guild Members list with Serial Numbers and click-to-copy -->
    <div id="guild-members-card" class="hidden glass-card rounded-2xl p-4 border border-white/5 shadow-lg">
        <h4 class="text-xs font-black text-yellow-400 uppercase tracking-widest mb-3 border-b border-white/5 pb-2"><i class="fas fa-users"></i> Guild Members Directory</h4>
        <div id="guild-members-list" class="space-y-2 max-h-80 overflow-y-auto pr-1">
            <!-- Loaded dynamically on runtime -->
        </div>
    </div>

    <script>
        async function loadGuildInfo() {
            let profileRes = await fetch('/api/bot/profile');
            let profileData = await profileRes.json();
            let container = document.getElementById('guild-status-info');
            
            if(profileData.success && profileData.profile.clan_id && profileData.profile.clan_id !== "0") {
                const clanId = profileData.profile.clan_id;
                document.getElementById('guild-id-display-badge').innerText = "ID: " + clanId;
                
                let res = await fetch(`/api/guild/info/${clanId}`);
                let data = await res.json();
                
                if(data.success) {
                    const g = data.guild_info;
                    container.innerHTML = `
                        <!-- Compact Header details -->
                        <div class="text-center pb-1">
                            <h4 class="text-base font-black text-white font-orbitron tracking-wide">${g.clan_name}</h4>
                        </div>
                        
                        <!-- Compact 5-Metric Micro-Grid -->
                        <div class="grid grid-cols-3 gap-2 text-center">
                            <div class="bg-black/30 p-1.5 rounded-xl border border-white/5">
                                <span class="text-gray-500 text-[8px] uppercase tracking-wider block mb-0.5">Level</span>
                                <b class="text-purple-400 text-xs font-orbitron">LV. ${g.level}</b>
                            </div>
                            <div class="bg-black/30 p-1.5 rounded-xl border border-white/5">
                                <span class="text-gray-500 text-[8px] uppercase tracking-wider block mb-0.5">Slots</span>
                                <b class="text-white text-xs font-orbitron">${g.total_members}/${g.max_members}</b>
                            </div>
                            <div class="bg-black/30 p-1.5 rounded-xl border border-white/5">
                                <span class="text-gray-500 text-[8px] uppercase tracking-wider block mb-0.5">Weekly</span>
                                <b class="text-cyan-400 text-xs font-mono">${g.recent_glory}</b>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 text-center">
                            <div class="bg-black/30 p-1.5 rounded-xl border border-white/5">
                                <span class="text-gray-500 text-[8px] uppercase tracking-wider block mb-0.5">Total Glory Points</span>
                                <b class="text-emerald-400 text-xs font-mono">${g.total_glory}</b>
                            </div>
                            <div class="bg-black/30 p-1.5 rounded-xl border border-white/5">
                                <span class="text-gray-500 text-[8px] uppercase tracking-wider block mb-0.5">Past Glory Record</span>
                                <b class="text-yellow-400 text-xs font-mono">${g.past_glory}</b>
                            </div>
                        </div>
                        
                        <button onclick="exitGuild('${g.clan_id}')" class="w-full bg-rose-600/15 text-rose-400 hover:bg-rose-600 hover:text-white transition-all py-2 rounded-xl text-[10px] font-black border border-rose-500/10 uppercase tracking-wider">
                            EXIT / QUIT THIS CLAN
                        </button>
                    `;
                    loadGuildMembers(clanId);
                }
            } else {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-2 text-xs">
                        Bot is currently not enrolled in any Garena Guild.
                    </div>
                    <div class="flex gap-2" id="guild-search-form-block">
                        <input type="number" id="join-guild-id" placeholder="Enter Target Guild ID" class="flex-1 bg-[#11131a] border border-white/10 text-white rounded-xl p-2.5 text-xs font-bold outline-none focus:border-yellow-400">
                        <button onclick="checkGuildDetails()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black px-4 rounded-xl text-xs uppercase tracking-widest">Check</button>
                    </div>
                    <div id="checked-guild-preview" class="hidden mt-3 space-y-3">
                        <!-- Loaded dynamically on checking guild -->
                    </div>
                `;
                document.getElementById('guild-members-card').classList.add('hidden');
                document.getElementById('guild-id-display-badge').innerText = "ID: 0000";
            }
        }

        async function checkGuildDetails() {
            let id = document.getElementById('join-guild-id').value.trim();
            if(!id) return showToast("Guild ID required", "error");

            try {
                let res = await fetch(`/api/guild/info/${id}`);
                let data = await res.json();

                if(data.success) {
                    const g = data.guild_info;
                    document.getElementById('guild-id-display-badge').innerText = "ID: " + g.clan_id;
                    const preview = document.getElementById('checked-guild-preview');
                    
                    preview.innerHTML = `
                        <div class="bg-black/40 p-4 rounded-2xl border border-white/5 space-y-3">
                            <div class="text-center border-b border-white/5 pb-2">
                                <span class="text-gray-500 text-[8px] uppercase tracking-wider block">Scanned Guild Info</span>
                                <h4 class="text-sm font-black text-yellow-400 font-orbitron">${g.clan_name}</h4>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-center text-xs">
                                <div class="bg-[#11131a] p-1.5 rounded-xl border border-white/5">
                                    <span class="text-gray-500 text-[7px] uppercase tracking-wider block mb-0.5">Level</span>
                                    <b class="text-purple-400 font-orbitron">LV. ${g.level}</b>
                                </div>
                                <div class="bg-[#11131a] p-1.5 rounded-xl border border-white/5">
                                    <span class="text-gray-500 text-[7px] uppercase tracking-wider block mb-0.5">Slots</span>
                                    <b class="text-white font-orbitron">${g.total_members}/${g.max_members}</b>
                                </div>
                                <div class="bg-[#11131a] p-1.5 rounded-xl border border-white/5">
                                    <span class="text-gray-500 text-[7px] uppercase tracking-wider block mb-0.5">Weekly</span>
                                    <b class="text-cyan-400 font-mono">${g.recent_glory}</b>
                                </div>
                            </div>
                            <div class="flex gap-2 pt-1">
                                <button onclick="submitJoinGuildRequest('${g.clan_id}')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-black py-2 rounded-xl text-[10px] uppercase tracking-wider transition-all shadow-md">
                                    Send Join Request
                                </button>
                                <button onclick="loadGuildInfo()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-xl text-[10px] uppercase font-black tracking-wider transition-all">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    `;
                    preview.classList.remove('hidden');
                } else {
                    showToast(data.message || "Guild details not found.", "error");
                }
            } catch(e) {
                showToast("Connection to server failed.", "error");
            }
        }

        async function submitJoinGuildRequest(clanId) {
            try {
                let res = await fetch('/api/guild/join', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ clan_id: clanId }) 
                });
                let data = await res.json();
                if(data.success) { 
                    showToast("Garena Guild Request Sent!"); 
                    loadGuildInfo();
                } else {
                    showToast("Join request rejected.", "error");
                }
            } catch(e) {
                showToast("Request failed to submit", "error");
            }
        }

        // avatar parser helper 
        function getAvatarUrl(id) {
            let avatarId = String(id).trim();
            if (!avatarId.startsWith("902") || avatarId.length < 9) {
                avatarId = "902000003"; // standard fallback
            }
            return `https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${avatarId}.png`;
        }

        async function loadGuildMembers(clanId) {
            let res = await fetch(`/api/guild/members/${clanId}`);
            let data = await res.json();
            let card = document.getElementById('guild-members-card');
            let list = document.getElementById('guild-members-list');
            
            if(data.success) {
                card.classList.remove('hidden');
                let html = '';
                let indexCounter = 1;
                
                const renderMemberRow = (m, roleText, bgClass, textClass, badgeClass, icon) => {
                    return `
                    <div class="p-3 ${bgClass} rounded-2xl border border-white/5 text-xs flex justify-between items-center transition-all duration-300">
                        <div class="flex items-center gap-3 min-w-0 flex-1">
                            <span class="text-gray-500 font-bold font-mono text-xs w-5 flex-shrink-0 text-center">${indexCounter++}.</span>
                            
                            <!-- Garena Avatar loaded via robust Validator -->
                            <div class="w-10 h-10 rounded-xl bg-black/40 border border-white/10 p-0.5 flex-shrink-0">
                                <img src="${getAvatarUrl(m.avatar_id)}" class="w-full h-full object-cover rounded-lg">
                            </div>
                            
                            <div class="min-w-0 flex-1">
                                <div class="flex items-center gap-1.5 mb-0.5">
                                    <span class="font-bold text-white truncate max-w-[130px] block">${m.name}</span>
                                    <span class="bg-yellow-500/10 text-yellow-400 text-[8px] font-black px-1.5 py-0.5 rounded-full uppercase font-orbitron">Lv. ${m.level}</span>
                                </div>
                                <span onclick="window.copyToClipboard('${m.uid}', this)" class="text-[9px] text-gray-400 font-mono block cursor-pointer hover:text-yellow-400 transition-colors">
                                    UID: ${m.uid} <i class="far fa-copy text-[8px] ml-1 opacity-70"></i> | ${roleText}
                                </span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col justify-center flex-shrink-0">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Weekly Glory</span>
                            <b class="${textClass} font-mono font-black text-sm">${m.weekly_glory}</b>
                        </div>
                    </div>`;
                };

                // 1. Render Guild Leader
                if(data.leader) {
                    html += renderMemberRow(data.leader, "👑 Guild Leader", "bg-yellow-500/10 border-yellow-500/25", "text-yellow-400", "bg-yellow-500/10 text-yellow-400", "fa-crown");
                }

                // 2. Render Acting Leader if present in Garena roster
                if(data.acting_leader) {
                    html += renderMemberRow(data.acting_leader, "⭐ Acting Leader", "bg-purple-500/15 border-purple-500/25", "text-purple-400", "bg-purple-500/10 text-purple-400", "fa-star");
                }
                
                // 3. Render Officers
                (data.officers || []).forEach(o => {
                    html += renderMemberRow(o, "👮 Guild Officer", "bg-purple-500/5 border-purple-500/15", "text-purple-300", "bg-purple-500/10 text-purple-300", "fa-shield-halved");
                });
                
                // 4. Render Members
                (data.members || []).forEach(m => {
                    html += renderMemberRow(m, "👤 Clan Member", "bg-black/30", "text-gray-400", "bg-white/5 text-gray-400", "fa-user");
                });
                list.innerHTML = html;
            }
        }

        async function exitGuild(clanId) {
            window.showConfirmModal(
                "Quit Guild?", 
                "Are you sure you want to quit this Garena clan?", 
                async () => {
                    let res = await fetch('/api/guild/leave', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({clan_id: clanId}) });
                    let data = await res.json();
                    if(data.success) { showToast("Successfully left the guild."); loadGuildInfo(); loadBotProfile(); }
                },
                "fa-sign-out-alt"
            );
        }
    </script>
</div>
